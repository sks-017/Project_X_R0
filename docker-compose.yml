version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    container_name: acron_db
    environment:
      POSTGRES_USER: acron
      POSTGRES_PASSWORD: acron_s7_2026
      POSTGRES_DB: acron
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U acron" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./ingress-api
    container_name: acron_api
    environment:
      DATABASE_URL: postgresql://acron:acron_s7_2026@postgres:5432/acron
      TIMESCALEDB_ENABLED: "true"
      DEMO_MODE: "true"
      SIMULATOR_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  dashboard:
    build: ./acron-ui
    container_name: acron_dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  legacy-dashboard:
    build: ./dashboard
    container_name: acron_legacy_dashboard
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  gateway:
    build: ./edge
    container_name: acron_gateway
    environment:
      API_URL: http://api:8000/api/v1/telemetry
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: acron_network
