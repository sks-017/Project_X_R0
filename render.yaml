databases:
  - name: ge-pulse-postgres
    plan: free
    databaseName: gepulse
    user: gepulse

services:
  - type: web
    name: ge-pulse-api
    runtime: docker
    plan: free
    dockerfilePath: ./ingress-api/Dockerfile
    dockerContext: ./ingress-api
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ge-pulse-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "true"
      - key: SIMULATOR_ENABLED
        value: "true"
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: DEMO_ADMIN_PASSWORD
        value: admin123

  - type: web
    name: ge-pulse-dashboard
    runtime: docker
    plan: free
    dockerfilePath: ./dashboard/Dockerfile
    dockerContext: ./dashboard
    autoDeployTrigger: commit
    envVars:
      - key: API_URL
        value: https://ge-pulse-api.onrender.com
      - key: SESSION_TIMEOUT_SECONDS
        value: "1800"
